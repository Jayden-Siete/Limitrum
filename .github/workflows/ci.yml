name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ./limitrum-ci.sqlite
      LIMITRUM_MASTER_API_KEY: ci_master_key_000000000000000000000000
      LIMITRUM_VERIFY_INTENT_PUBLIC: "true"
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed deterministic test data
        run: pnpm db:seed

      - name: Build shared packages
        run: |
          pnpm --filter @limitrum/db build
          pnpm --filter @limitrum/sdk build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Build all apps and packages
        run: pnpm build

      - name: Start API
        run: |
          pnpm --filter @limitrum/api dev > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat api.log
          exit 1

      - name: Integration tests
        run: pnpm test:integration

      - name: Upload API logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
